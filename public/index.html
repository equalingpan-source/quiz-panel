<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz Panel</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main class="page landing-page">
    <section class="panel simple-panel">
      <h1>Quiz Panel</h1>
      <p class="description">子機の回答を親機で確認して、表示したいものだけモニターへ出せるシンプルな回答パネルです。</p>

      <div class="button-row">
        <a class="button button-primary" href="/host.html">親機を開く</a>
        <a class="button" href="/player-entry.html">子機を開く</a>
      </div>

      <div class="simple-box">
        <p class="label">使い方</p>
        <ol>
          <li>親機でルームを作成</li>
          <li>QRまたはURLから子機を参加させる</li>
          <li>子機が回答を入力すると親機の確認一覧に反映</li>
          <li>親機で表示したい回答を選んでモニターへ公開</li>
        </ol>
      </div>
    </section>
  </main>
</body>
</html>
